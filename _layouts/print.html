---
layout: compress
---
<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <style>
    @page {
      size: A4;
      margin: 0.5cm 0.5cm;
    }
    body {
      margin: 0;
      padding: 0;
      background: white;
      font-size: 12pt;
      line-height: 1.3;
    }
    .wrapper {
      margin: 0;
      padding: 0;
      max-width: 100% !important;
    }
    .main-wrapper {
      margin: 0;
      padding: 0 10px;
    }
    .container {
      width: 100%;
      padding: 0;
    }
    .btn {
      display: none;
    }
    a[href]:after {
      content: none !important;
    }
    .print-hide {
      display: none !important;
    }
  </style>
</head>
<body class="print-mode">
  <div class="wrapper">
    {% include sidebar.html %}
    <div class="main-wrapper">{{ content }}</div>
  </div>
  {% include scripts.html %}
  <script>
    // Remove any print buttons before printing
    document.addEventListener('DOMContentLoaded', function() {
      const printButtons = document.querySelectorAll('.print-button');
      printButtons.forEach(btn => btn.style.display = 'none');
    });
  </script>
</body>
</html>
